aid: google-cloud-security-command-center
name: Google Cloud Security Command Center
description: >-
  Google Cloud Security Command Center (SCC) is a security and risk management
  platform for Google Cloud that helps organizations identify misconfigurations,
  vulnerabilities, and threats across their cloud assets. It provides centralized
  visibility into cloud resources, security findings, and compliance status,
  enabling security teams to detect, investigate, and respond to threats.
