apis:
  - name: Security Command Center API
    description: >-
      The Security Command Center API provides programmatic access to security
      findings, assets, and sources within Google Cloud. Developers can use the API
      to list and manage security findings, create and manage notification configs,
      run asset discovery, and configure organization-level security settings.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
